name: Azure Standby Failover

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment for failover'
        required: true
        type: choice
        options:
          - staging
          - production
      confirm_failover:
        description: 'Type CONFIRM to proceed with failover'
        required: true
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation input
        if: ${{ github.event.inputs.confirm_failover != 'CONFIRM' }}
        run: |
          echo "Failover not confirmed. Exiting."
          exit 1

      - name: Confirmation accepted
        run: echo "Confirmation received. Proceeding to Azure failover."

  azure_failover:
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30
    env:
      TF_WORKING_DIR: terraform/azure
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Check If Azure VM Exists
        id: check_vm
        run: |
          VM_STATE=$(az vm show --resource-group multi-cloud-rg --name multi-cloud-azure-vm --query "powerState" -d --output tsv 2>/dev/null || echo "NOT_FOUND")
          echo "VM State: $VM_STATE"
          echo "vm_state=$VM_STATE" >> $GITHUB_OUTPUT

      - name: Start VM if Stopped
        if: ${{ steps.check_vm.outputs.vm_state == 'VM stopped' || steps.check_vm.outputs.vm_state == 'VM deallocated' }}
        run: |
          echo "VM exists but is stopped. Starting VM..."
          az vm start --resource-group multi-cloud-rg --name multi-cloud-azure-vm
          echo "VM started successfully!"

      - name: Wait for VM to be Ready
        if: ${{ steps.check_vm.outputs.vm_state == 'VM stopped' || steps.check_vm.outputs.vm_state == 'VM deallocated' }}
        run: |
          echo "Waiting 60 seconds for VM to fully start..."
          sleep 60
          echo "VM should be ready now."

      - name: Setup Terraform
        if: ${{ steps.check_vm.outputs.vm_state == 'NOT_FOUND' }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9.0"

      - name: Terraform Init
        if: ${{ steps.check_vm.outputs.vm_state == 'NOT_FOUND' }}
        run: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Validate
        if: ${{ steps.check_vm.outputs.vm_state == 'NOT_FOUND' }}
        run: terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Plan
        if: ${{ steps.check_vm.outputs.vm_state == 'NOT_FOUND' }}
        id: plan
        run: terraform plan -out=tfplan -detailed-exitcode
        working-directory: ${{ env.TF_WORKING_DIR }}
        continue-on-error: true

      - name: Terraform Apply
        if: ${{ steps.check_vm.outputs.vm_state == 'NOT_FOUND' && steps.plan.outputs.exitcode == '2' }}
        run: terraform apply -auto-approve tfplan
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Get Azure VM Public IP
        id: get_ip
        run: |
          IP=$(az vm show --resource-group multi-cloud-rg --name multi-cloud-azure-vm --query "publicIps" -d --output tsv 2>/dev/null || echo "unknown")
          echo "public_ip=$IP" >> $GITHUB_OUTPUT
          echo "Azure VM Public IP: $IP"

      - name: Failover Success
        if: success()
        run: |
          echo "================================================"
          echo "  Azure Standby Environment is LIVE!"
          echo "================================================"
          echo "  Environment : ${{ github.event.inputs.environment }}"
          echo "  VM Status   : ${{ steps.check_vm.outputs.vm_state }}"
          echo "  Public IP   : ${{ steps.get_ip.outputs.public_ip }}"
          echo "  App URL     : http://${{ steps.get_ip.outputs.public_ip }}:5000"
          echo "  Prometheus  : http://${{ steps.get_ip.outputs.public_ip }}:9090"
          echo "  Grafana     : http://${{ steps.get_ip.outputs.public_ip }}:3000"
          echo "================================================"

      - name: Failover Failed
        if: failure()
        run: |
          echo "================================================"
          echo "  Azure Failover FAILED. Check logs above."
          echo "================================================"
