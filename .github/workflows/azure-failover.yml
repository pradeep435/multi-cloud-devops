name: Azure Standby Failover

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment for failover'
        required: true
        type: choice
        options:
          - staging
          - production
      confirm_failover:
        description: 'Type CONFIRM to proceed with failover'
        required: true
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation input
        if: ${{ github.event.inputs.confirm_failover != 'CONFIRM' }}
        run: |
          echo "Failover not confirmed. Exiting."
          exit 1

      - name: Confirmation accepted
        run: echo "Confirmation received. Proceeding to Azure failover."

  azure_failover:
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30
    env:
      TF_WORKING_DIR: terraform/azure
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9.0"

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -out=tfplan \
            -detailed-exitcode
        working-directory: ${{ env.TF_WORKING_DIR }}
        continue-on-error: true

      - name: Fail on Terraform Plan Error
        if: steps.plan.outputs.exitcode == '1'
        run: |
          echo "Terraform plan encountered an error."
          exit 1

      - name: Terraform Apply
        if: steps.plan.outputs.exitcode == '2'
        run: terraform apply -auto-approve tfplan
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: No Changes Detected
        if: steps.plan.outputs.exitcode == '0'
        run: echo "Infrastructure already up to date. No changes needed."

      - name: Failover Success
        if: success()
        run: |
          echo "================================================"
          echo "Azure Standby Environment Deployed Successfully!"
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "================================================"

      - name: Failover Failed
        if: failure()
        run: |
          echo "================================================"
          echo "Azure Failover FAILED. Check logs above."
          echo "================================================"
